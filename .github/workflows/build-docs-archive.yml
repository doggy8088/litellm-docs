name: Build versioned docs archive

# Builds the FULL versioned documentation (current + every backfilled pip-release
# snapshot) and publishes it as a static archive to GitHub Pages. This runs OFF
# the merge-gating path: Vercel only ever builds the current docs (fast), and the
# frozen version snapshots — which never change — are rebuilt here only when they
# actually change (or on demand), where there is no 45-minute build cap.
#
# The Vercel site links old versions to this archive via DOCS_ARCHIVE_URL.
# See versioning/README.md for the full architecture and setup steps.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      # Only when the set of frozen versions actually changes.
      - 'versions.json'
      - 'versioned_docs/**'
      - 'versioned_sidebars/**'
      - 'versioning/**'
      - '.github/workflows/build-docs-archive.yml'

# Allow only one archive build at a time; let an in-progress run finish.
concurrency:
  group: docs-archive
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required to reconstruct each version's docs from its
          # mapped source commit (versioned snapshots are NOT committed).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate version snapshots from git history
        # Rebuilds versioned_docs/ + versioned_sidebars/ + versions.json from the
        # committed manifest. Idempotent; output is not committed to the repo.
        run: versioning/generate_versions.sh --reset

      - name: Build full versioned archive
        env:
          # Build every version (the whole point of the archive).
          DOCS_VERSIONS_BUILD_LIMIT: all
          # Mark this as the archive build: noindex + (optionally) Pages base URL.
          DOCS_ARCHIVE_BUILD: '1'
          # GitHub Pages PROJECT site URL. If you serve the archive from a custom
          # domain instead, set these to that domain with baseUrl '/'.
          DOCS_SITE_URL: https://${{ github.repository_owner }}.github.io
          DOCS_BASE_URL: /${{ github.event.repository.name }}/
          # Heap + FD headroom for the many-version build. The graceful-fs preload
          # is already wired into `npm run build` via package.json.
          NODE_OPTIONS: --max-old-space-size=12288
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
